# Ciyanea — URL-prefixed multi-language routes.
#
# Each language is keyed by a single country/flag code stored as the internal
# tag's slug (hash-<code>). This one code drives the content filter, the URL
# prefix, and the flag image. Codes: cn, us, de, fr, ru, it, es.
#
# Each /<code>/ collection declares `data: tag.hash-<code>` so the language's
# internal tag is bound into the template; {{tag.slug}} (value hash-<code>) is
# then used directly inside {{#get}} filters.
#
# The per-language /<code>/micro/ collections are added in later slices.
#
# The `/` root route renders the lang-redirect template: a no-content shell that
# loads lang-detect.js, which detects the visitor's preferred language and
# redirects to /<code>/. It is declared as a static route (inline flow mapping)
# so it is not a content collection.

routes:
  /: {template: lang-redirect}

collections:
  /cn/:
    permalink: /cn/{slug}/
    template: index
    filter: "tag:hash-cn+tag:-hash-micro"
    data: tag.hash-cn

  /us/:
    permalink: /us/{slug}/
    template: index
    filter: "tag:hash-us+tag:-hash-micro"
    data: tag.hash-us

  /de/:
    permalink: /de/{slug}/
    template: index
    filter: "tag:hash-de+tag:-hash-micro"
    data: tag.hash-de

  /fr/:
    permalink: /fr/{slug}/
    template: index
    filter: "tag:hash-fr+tag:-hash-micro"
    data: tag.hash-fr

  /ru/:
    permalink: /ru/{slug}/
    template: index
    filter: "tag:hash-ru+tag:-hash-micro"
    data: tag.hash-ru

  /it/:
    permalink: /it/{slug}/
    template: index
    filter: "tag:hash-it+tag:-hash-micro"
    data: tag.hash-it

  /es/:
    permalink: /es/{slug}/
    template: index
    filter: "tag:hash-es+tag:-hash-micro"
    data: tag.hash-es

taxonomies:
  tag: /tag/{slug}/
  author: /author/{slug}/
