# Ciyanea — URL-prefixed multi-language routes.
#
# Each language is keyed by a single country/flag code stored as the internal
# tag's slug (hash-<code>). This one code drives the content filter, the URL
# prefix, and the flag image. Codes: cn, us, de, fr, ru, it, es.
#
# Each /<code>/ collection is rendered by a per-language wrapper template
# (index-<code>.hbs) that injects lang="hash-<code>" into the shared homepage body.
# A route `data: tag.hash-<code>` binding is NOT used: Ghost cannot resolve an
# internal tag through `data` and 404s the whole collection index. The collection
# `filter` (a literal string) is unaffected and still scopes the posts.
#
# Each language also gets a /<code>/micro/ collection: the same internal language
# tag ANDed with #micro (hash-micro), rendered through its own wrapper template
# (micro-<code>.hbs) as a tweet-style infinite-scroll stream. The more specific
# /<code>/micro/ collection is declared before the broader /<code>/ index
# collection so Ghost routes the micro path to the micro template.
#
# The `/` root route renders the lang-redirect template: a no-content shell that
# loads lang-detect.js, which detects the visitor's preferred language and
# redirects to /<code>/. It is declared as a static route (inline flow mapping)
# so it is not a content collection.

routes:
  /: {template: lang-redirect}

collections:
  /cn/micro/:
    permalink: /cn/micro/{slug}/
    template: micro-cn
    filter: "tag:hash-cn+tag:hash-micro"

  /cn/:
    permalink: /cn/{slug}/
    template: index-cn
    filter: "tag:hash-cn+tag:-hash-micro"

  /us/micro/:
    permalink: /us/micro/{slug}/
    template: micro-us
    filter: "tag:hash-us+tag:hash-micro"

  /us/:
    permalink: /us/{slug}/
    template: index-us
    filter: "tag:hash-us+tag:-hash-micro"

  /de/micro/:
    permalink: /de/micro/{slug}/
    template: micro-de
    filter: "tag:hash-de+tag:hash-micro"

  /de/:
    permalink: /de/{slug}/
    template: index-de
    filter: "tag:hash-de+tag:-hash-micro"

  /fr/micro/:
    permalink: /fr/micro/{slug}/
    template: micro-fr
    filter: "tag:hash-fr+tag:hash-micro"

  /fr/:
    permalink: /fr/{slug}/
    template: index-fr
    filter: "tag:hash-fr+tag:-hash-micro"

  /ru/micro/:
    permalink: /ru/micro/{slug}/
    template: micro-ru
    filter: "tag:hash-ru+tag:hash-micro"

  /ru/:
    permalink: /ru/{slug}/
    template: index-ru
    filter: "tag:hash-ru+tag:-hash-micro"

  /it/micro/:
    permalink: /it/micro/{slug}/
    template: micro-it
    filter: "tag:hash-it+tag:hash-micro"

  /it/:
    permalink: /it/{slug}/
    template: index-it
    filter: "tag:hash-it+tag:-hash-micro"

  /es/micro/:
    permalink: /es/micro/{slug}/
    template: micro-es
    filter: "tag:hash-es+tag:hash-micro"

  /es/:
    permalink: /es/{slug}/
    template: index-es
    filter: "tag:hash-es+tag:-hash-micro"

taxonomies:
  tag: /tag/{slug}/
  author: /author/{slug}/
